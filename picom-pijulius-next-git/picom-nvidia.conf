###############################################################################
#  PICOM KONFIG – NVIDIA GPU (OpenGL >= 4.3)                                 #
#  PICOM CONFIG – NVIDIA GPU (OpenGL >= 4.3)                                 #
#                                                                            #
#  NVIDIA kártyákhoz optimalizált profil. A glx backend mellett be kell      #
#  kapcsolni az xrender-sync-fence opciót az explicit sync miatt.            #
#  Minden más beállítás azonos a modern Intel/AMD profiléval.                #
#  Optimized for NVIDIA cards. Besides glx backend, xrender-sync-fence       #
#  must be enabled for explicit sync. All other settings are the same as     #
#  the modern Intel/AMD profile.                                             #
###############################################################################

#################################
#         ÁLTALÁNOS / GENERAL    #
#################################

backend = "glx";
vsync = true;

# NVIDIA esetén szükséges lehet (explicit sync).
xrender-sync-fence = true;

unredir-if-possible = true;
unredir-if-possible-delay = 500;
use-damage = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
detect-rounded-corners = true;
inner-border-width = 1;
log-level = "warn";
dithered-present = true;


#################################
#     ÁRNYÉKOK / SHADOWS         #
#################################

shadow = true;
shadow-radius = 50;
shadow-opacity = 0.35;
shadow-offset-x = -49;
shadow-offset-y = -47;
shadow-color = "#00020b";


#################################
#        HALVÁNYÍTÁS / FADING    #
#################################

fading = false;


#################################
#   ÁTLÁTSZÓSÁG / OPACITY       #
#################################

frame-opacity = 1.0;
frame-opacity-for-same-colors = true;


#################################
#       SARKOK / CORNERS         #
#################################

corner-radius = 13;


#################################
# HÁTTÉR-HOMÁLYOSÍTÁS / BLUR    #
#################################

blur-background = true;
blur-background-frame = true;
blur-method = "dual_kawase";
blur-strength = 7;


#################################
#  ABLAKSZABÁLYOK / WINDOW RULES #
#################################

# A szabályok teljesen megegyeznek a modern/weak profilokéval.
rules = ({
    # Geany 94%-os átlátszósággal
    match = "class_g = 'Geany'";
    opacity = 0.94;

}, {
    # Értesítések – nincs árnyék
    match = "name = 'Notification' || class_g ?= 'Notify-osd'";
    shadow = false;

}, {
    # GTK keret ablakok – nincs árnyék, nincs blur
    match = "_GTK_FRAME_EXTENTS@";
    shadow = false;
    blur-background = false;

}, {
    # Dokk és asztal – nincs blur, nincs kerekítés
    match = "window_type = 'dock' || window_type = 'desktop'";
    blur-background = false;
    corner-radius = 0;

}, {
    # Eszköztippek – enyhe átlátszóság, árnyék, nincs blur
    match = "window_type = 'tooltip'";
    opacity = 0.95;
    shadow = true;
    blur-background = false;

}, {
    # DND ablakok – nincs árnyék
    match = "window_type = 'dnd'";
    shadow = false;

}, {
    # Dialógusok – animált megjelenés/eltűnés
    match = "WM_TRANSIENT_FOR@";
    animations = ({
        triggers = ["open", "show"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        blur-opacity = {
            curve = "linear";
            duration = 0.08;
            delay = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        shadow-opacity = "opacity";
        scale-y = {
            curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
            duration = 0.12;
            start = 0.8;
            end = 1;
        };
        offset-y = "(-window-height/2) + (window-height/2) * scale-y";
        shadow-scale-y = "scale-y";
        shadow-offset-y = "offset-y";
    },{
        triggers = ["close", "hide"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "0";
        };
        blur-opacity = 0;
        shadow-opacity = "opacity";
        scale-y = {
            curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
            duration = 0.12;
            start = 1;
            end = 0.7;
        };
        offset-y = "(-window-height/2) + (window-height/2) * scale-y";
        shadow-scale-y = "scale-y";
        shadow-offset-y = "offset-y";
    });

}, {
    # Menük – enyhe átlátszóság és animációk
    match = "window_type = 'dropdown_menu' || window_type = 'popup_menu' || window_type = 'menu'";
    opacity = 0.95;
    animations = ({
        triggers = ["open", "show"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        blur-opacity = {
            curve = "linear";
            duration = 0.08;
            delay = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        shadow-opacity = "opacity";
        scale-y = {
            curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
            duration = 0.12;
            start = 0.8;
            end = 1;
        };
        shadow-scale-y = "scale-y";
    },{
        triggers = ["close", "hide"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "0";
        };
        blur-opacity = 0;
        shadow-opacity = "opacity";
        scale-y = {
            curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
            duration = 0.12;
            start = 1;
            end = 0.7;
        };
        shadow-scale-y = "scale-y";
    });

}, {
    # Teljes képernyős / i3lock – nincs árnyék, nincs kerekítés
    match = "class_g *= 'i3lock' || _NET_WM_STATE@[1] = '_NET_WM_STATE_FULLSCREEN' || _NET_WM_STATE@[2] = '_NET_WM_STATE_FULLSCREEN' || _NET_WM_STATE@[3] = '_NET_WM_STATE_FULLSCREEN' || _NET_WM_STATE@[4] = '_NET_WM_STATE_FULLSCREEN'";
    shadow = false;
    corner-radius = 0;
    animations = ({
        triggers = ["open", "show"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        blur-opacity = {
            curve = "linear";
            duration = 0.08;
            delay = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        shadow-opacity = "opacity";
    },{
        triggers = ["close", "hide"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "0";
        };
        blur-opacity = 0;
        shadow-opacity = "opacity";
    });

});


#################################
#   GLOBÁLIS ANIMÁCIÓK / GLOBAL  #
#################################

# Minden animáció, beleértve a geometry animációt is.
animations = ({
    triggers = ["close", "hide"];
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "window-raw-opacity-before";
        end = "window-raw-opacity";
    };
    blur-opacity = "0";
    shadow-opacity = "opacity";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height * 5";
    scale-x = {
        curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
        duration = 0.12;
        start = 1;
        end = 0.9;
    };
    scale-y = "scale-x";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
}, {
    triggers = ["open", "show"];
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "window-raw-opacity-before";
        end = "window-raw-opacity";
    };
    blur-opacity = {
        curve = "linear";
        duration = 0.08;
        delay = 0.12;
        start = "window-raw-opacity-before";
        end = "window-raw-opacity";
    };
    shadow-opacity = "opacity";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height * 5";
    scale-x = {
        curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
        duration = 0.12;
        start = 0.95;
        end = 1;
    };
    scale-y = "scale-x";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
}, {
    triggers = ["workspace-out"];
    offset-y = {
        curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
        duration = 0.12;
        start = "0";
        end = "- window-height / 2";
    };
    shadow-offset-y = "offset-y";
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "window-raw-opacity-before";
        end = "window-raw-opacity";
    };
    blur-opacity = "0";
    shadow-opacity = "opacity";
}, {
    triggers = ["workspace-out-inverse"];
    offset-y = {
        curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
        duration = 0.12;
        start = "0";
        end = "window-height / 2";
    };
    shadow-offset-y = "offset-y";
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "window-raw-opacity-before";
        end = "window-raw-opacity";
    };
    blur-opacity = "0";
    shadow-opacity = "opacity";
}, {
    triggers = ["workspace-in"];
    offset-y = {
        curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
        duration = 0.12;
        start = "window-height / 2";
        end = "0";
    };
    shadow-offset-y = "offset-y";
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "0";
        end = "window-raw-opacity";
    };
    blur-opacity = {
        curve = "linear";
        duration = 0.08;
        delay = 0.12;
        start = "0";
        end = "window-raw-opacity";
    };
    shadow-opacity = "opacity";
}, {
    triggers = ["workspace-in-inverse"];
    offset-y = {
        curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
        duration = 0.12;
        start = "- window-height / 2";
        end = "0";
    };
    shadow-offset-y = "offset-y";
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "0";
        end = "window-raw-opacity";
    };
    blur-opacity = {
        curve = "linear";
        duration = 0.08;
        delay = 0.12;
        start = "0";
        end = "window-raw-opacity";
    };
    shadow-opacity = "opacity";
}, {
    # GEOMETRY ANIMÁCIÓ – átméretezés/mozgatás
    triggers = [ "geometry" ];
    preset = "geometry-change";
});