###############################################################################
#  PICOM KONFIG – MODERN INTEL / AMD GPU (OpenGL >= 4.3)                    #
#  PICOM CONFIG – MODERN INTEL / AMD GPU (OpenGL >= 4.3)                    #
#                                                                            #
#  Ez a profil modern, nagy teljesítményű Intel és AMD GPU-khoz készült.     #
#  A glx backendet használja, minden GPU-gyorsított effekt (dual_kawase      #
#  blur, nagy árnyék, lekerekített sarkok, geometry animáció) be van         #
#  kapcsolva. xrender-sync-fence = false, mert Intel/AMD nem igényli.        #
#  This profile is for modern, powerful Intel and AMD GPUs. It uses the      #
#  glx backend, with all GPU-accelerated effects (dual_kawase blur, large    #
#  shadow, rounded corners, geometry animation) enabled.                     #
#  xrender-sync-fence = false, because Intel/AMD do not need it.            #
###############################################################################

#################################
#         ÁLTALÁNOS / GENERAL    #
#################################

# Modern GPU-kon a glx backend ajánlott (hardveres gyorsítás).
# On modern GPUs the glx backend is recommended (hardware acceleration).
backend = "glx";

# Függőleges szinkronizáció.
vsync = true;

# xrender-sync-fence – Intel/AMD-n nem szükséges.
xrender-sync-fence = false;

# Fullscreen ablakok közvetlen megjelenítése.
unredir-if-possible = true;
unredir-if-possible-delay = 500;

use-damage = true;
detect-client-opacity = true;
detect-transient = true;
detect-client-leader = true;
detect-rounded-corners = true;

# Vékony belső keret (pijulius effekt) – GPU-n olcsó, bekapcsolva.
inner-border-width = 1;

log-level = "warn";

# Dithering – OpenGL alatt bekapcsolható a sávosodás csökkentésére.
dithered-present = true;


#################################
#     ÁRNYÉKOK / SHADOWS         #
#################################

shadow = true;

# Nagy, látványos árnyék – GPU-n gyors.
shadow-radius = 50;
shadow-opacity = 0.35;
shadow-offset-x = -49;
shadow-offset-y = -47;
shadow-color = "#00020b";


#################################
#        HALVÁNYÍTÁS / FADING    #
#################################

fading = false;


#################################
#   ÁTLÁTSZÓSÁG / OPACITY       #
#################################

frame-opacity = 1.0;
frame-opacity-for-same-colors = true;
# inactive-opacity = 0.95;
# active-opacity = 1.0;


#################################
#       SARKOK / CORNERS         #
#################################

# Lekerekített sarkok – GPU-n nincs érezhető terhelés.
corner-radius = 13;


#################################
# HÁTTÉR-HOMÁLYOSÍTÁS / BLUR    #
#################################

# dual_kawase blur – a legjobb minőség/teljesítmény arány GPU-n.
blur-background = true;
blur-background-frame = true;
blur-method = "dual_kawase";
blur-strength = 7;             # 1–20, magasabb érték = erősebb homály


#################################
#  ABLAKSZABÁLYOK / WINDOW RULES #
#################################

# (A szabályok megegyeznek a weak profiléval, de itt a teljes blokk bemásolva)
rules = ({
    # Geany 94%-os átlátszósággal
    match = "class_g = 'Geany'";
    opacity = 0.94;

}, {
    # Értesítések / Notifications – nincs árnyék
    match = "name = 'Notification' || class_g ?= 'Notify-osd'";
    shadow = false;

}, {
    # GTK keret ablakok – nincs árnyék, nincs blur
    match = "_GTK_FRAME_EXTENTS@";
    shadow = false;
    blur-background = false;

}, {
    # Dokk és asztal ablakok – nincs blur, nincs lekerekítés
    match = "window_type = 'dock' || window_type = 'desktop'";
    blur-background = false;
    corner-radius = 0;

}, {
    # Eszköztippek – enyhe átlátszóság, árnyék, de nincs blur
    match = "window_type = 'tooltip'";
    opacity = 0.95;
    shadow = true;
    blur-background = false;

}, {
    # Drag-and-drop ablakok – nincs árnyék
    match = "window_type = 'dnd'";
    shadow = false;

}, {
    # Dialógusok – animált megjelenés/eltűnés
    match = "WM_TRANSIENT_FOR@";
    animations = ({
        triggers = ["open", "show"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        blur-opacity = {
            curve = "linear";
            duration = 0.08;
            delay = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        shadow-opacity = "opacity";
        scale-y = {
            curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
            duration = 0.12;
            start = 0.8;
            end = 1;
        };
        offset-y = "(-window-height/2) + (window-height/2) * scale-y";
        shadow-scale-y = "scale-y";
        shadow-offset-y = "offset-y";
    },{
        triggers = ["close", "hide"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "0";
        };
        blur-opacity = 0;
        shadow-opacity = "opacity";
        scale-y = {
            curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
            duration = 0.12;
            start = 1;
            end = 0.7;
        };
        offset-y = "(-window-height/2) + (window-height/2) * scale-y";
        shadow-scale-y = "scale-y";
        shadow-offset-y = "offset-y";
    });

}, {
    # Menük – enyhe átlátszóság és animációk
    match = "window_type = 'dropdown_menu' || window_type = 'popup_menu' || window_type = 'menu'";
    opacity = 0.95;
    animations = ({
        triggers = ["open", "show"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        blur-opacity = {
            curve = "linear";
            duration = 0.08;
            delay = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        shadow-opacity = "opacity";
        scale-y = {
            curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
            duration = 0.12;
            start = 0.8;
            end = 1;
        };
        shadow-scale-y = "scale-y";
    },{
        triggers = ["close", "hide"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "0";
        };
        blur-opacity = 0;
        shadow-opacity = "opacity";
        scale-y = {
            curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
            duration = 0.12;
            start = 1;
            end = 0.7;
        };
        shadow-scale-y = "scale-y";
    });

}, {
    # Teljes képernyős ablakok / i3lock – nincs árnyék, nincs kerekítés
    match = "class_g *= 'i3lock' || _NET_WM_STATE@[1] = '_NET_WM_STATE_FULLSCREEN' || _NET_WM_STATE@[2] = '_NET_WM_STATE_FULLSCREEN' || _NET_WM_STATE@[3] = '_NET_WM_STATE_FULLSCREEN' || _NET_WM_STATE@[4] = '_NET_WM_STATE_FULLSCREEN'";
    shadow = false;
    corner-radius = 0;
    animations = ({
        triggers = ["open", "show"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        blur-opacity = {
            curve = "linear";
            duration = 0.08;
            delay = 0.12;
            start = "window-raw-opacity-before";
            end = "window-raw-opacity";
        };
        shadow-opacity = "opacity";
    },{
        triggers = ["close", "hide"];
        opacity = {
            curve = "linear";
            duration = 0.12;
            start = "window-raw-opacity-before";
            end = "0";
        };
        blur-opacity = 0;
        shadow-opacity = "opacity";
    });

});


#################################
#   GLOBÁLIS ANIMÁCIÓK / GLOBAL  #
#################################

# A geometry animáció is be van kapcsolva, mert GPU-n nem lassít.
animations = ({
    # Bezárás / elrejtés animáció
    triggers = ["close", "hide"];
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "window-raw-opacity-before";
        end = "window-raw-opacity";
    };
    blur-opacity = "0";
    shadow-opacity = "opacity";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height * 5";
    scale-x = {
        curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
        duration = 0.12;
        start = 1;
        end = 0.9;
    };
    scale-y = "scale-x";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
}, {
    # Megnyitás / megjelenítés animáció
    triggers = ["open", "show"];
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "window-raw-opacity-before";
        end = "window-raw-opacity";
    };
    blur-opacity = {
        curve = "linear";
        duration = 0.08;
        delay = 0.12;
        start = "window-raw-opacity-before";
        end = "window-raw-opacity";
    };
    shadow-opacity = "opacity";
    offset-x = "(1 - scale-x) / 2 * window-width";
    offset-y = "(1 - scale-y) / 2 * window-height * 5";
    scale-x = {
        curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
        duration = 0.12;
        start = 0.95;
        end = 1;
    };
    scale-y = "scale-x";
    shadow-scale-x = "scale-x";
    shadow-scale-y = "scale-y";
    shadow-offset-x = "offset-x";
    shadow-offset-y = "offset-y";
}, {
    # Munkaterület váltás – kilépő ablakok (lefelé csúszás)
    triggers = ["workspace-out"];
    offset-y = {
        curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
        duration = 0.12;
        start = "0";
        end = "- window-height / 2";
    };
    shadow-offset-y = "offset-y";
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "window-raw-opacity-before";
        end = "window-raw-opacity";
    };
    blur-opacity = "0";
    shadow-opacity = "opacity";
}, {
    triggers = ["workspace-out-inverse"];
    offset-y = {
        curve = "cubic-bezier(0.21, 0.02, 0.76, 0.36)";
        duration = 0.12;
        start = "0";
        end = "window-height / 2";
    };
    shadow-offset-y = "offset-y";
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "window-raw-opacity-before";
        end = "window-raw-opacity";
    };
    blur-opacity = "0";
    shadow-opacity = "opacity";
}, {
    # Munkaterület váltás – bejövő ablakok (fentről csúszás)
    triggers = ["workspace-in"];
    offset-y = {
        curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
        duration = 0.12;
        start = "window-height / 2";
        end = "0";
    };
    shadow-offset-y = "offset-y";
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "0";
        end = "window-raw-opacity";
    };
    blur-opacity = {
        curve = "linear";
        duration = 0.08;
        delay = 0.12;
        start = "0";
        end = "window-raw-opacity";
    };
    shadow-opacity = "opacity";
}, {
    triggers = ["workspace-in-inverse"];
    offset-y = {
        curve = "cubic-bezier(0.24, 0.64, 0.79, 0.98)";
        duration = 0.12;
        start = "- window-height / 2";
        end = "0";
    };
    shadow-offset-y = "offset-y";
    opacity = {
        curve = "linear";
        duration = 0.12;
        start = "0";
        end = "window-raw-opacity";
    };
    blur-opacity = {
        curve = "linear";
        duration = 0.08;
        delay = 0.12;
        start = "0";
        end = "window-raw-opacity";
    };
    shadow-opacity = "opacity";
}, {
    # GEOMETRY ANIMÁCIÓ – átméretezés/mozgatás, csak GPU-n ajánlott
    triggers = [ "geometry" ];
    preset = "geometry-change";
});